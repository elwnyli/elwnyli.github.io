<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>土豆熬孬土豆</title>
    <meta name="description" content="一些有用的教程和笔记，慢慢攒着。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfaf5;
            --text: #2c2416;
            --text-light: #b8af9a;
            --text-secondary: #7b725f;
            --accent: #c77d3a;
            --accent-light: #fdf0e0;
            --border: #ece4d5;
            --surface: #fffefb;
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: url("daisy-cursor.png") 12 12, auto; }

        /* 装饰元素 */
        .decor-el { position: fixed; opacity: 0.25; pointer-events: none; z-index: 0; transition: opacity 0.6s; }
        .decor-el svg { width: 100%; height: 100%; }
        .decor-el:hover { opacity: 0.55; transform: scale(1.2); }
        @keyframes decorFloat1 { 0%,100% { transform: translateY(0) rotate(0deg); } 30% { transform: translateY(-12px) rotate(5deg); } 60% { transform: translateY(-6px) rotate(-5deg); } 85% { transform: translateY(-16px) rotate(3deg); } }
        @keyframes decorFloat2 { 0%,100% { transform: translateY(0) rotate(0deg); } 25% { transform: translateY(-8px) rotate(-4deg); } 55% { transform: translateY(-14px) rotate(6deg); } 80% { transform: translateY(-4px) rotate(-2deg); } }
        @keyframes decorFloat3 { 0%,100% { transform: translateY(0) rotate(0deg) scaleX(1); } 20% { transform: translateY(-12px) rotate(4deg) scaleX(1); } 50% { transform: translateY(-8px) rotate(-4deg) scaleX(-1); } 75% { transform: translateY(-16px) rotate(2deg) scaleX(-1); } }

        body {
            font-family: "Inter", -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            cursor: url("daisy-cursor.png") 12 12, auto;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 100px 24px 80px;
        }

        /* 头像 + 名字 横排 */
        .profile-row {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 32px;
        }

        .avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }

        /* 标题 */
        .profile-row h1 {
            font-family: "Noto Serif SC", serif;
            font-size: 2rem;
            font-weight: 600;
            margin: 0;
            line-height: 1.3;
        }

        /* 简介 */
        .bio {
            color: var(--text-secondary);
            font-size: 1.2rem;
            margin-bottom: 44px;
            line-height: 1.7;
            font-family: "Noto Serif SC", serif;
            letter-spacing: 0.5px;
        }

        .bio .accent {
            color: var(--accent);
            font-weight: 600;
        }

        .bio::before {
            content: "";
            display: block;
            width: 40px;
            height: 2px;
            background: var(--accent);
            margin-bottom: 16px;
            border-radius: 1px;
        }

        /* 链接列表 */
        .links {
            list-style: none;
        }

        .links li {
            margin-bottom: 14px;
            opacity: 0;
            animation: fadeIn 0.5s ease forwards;
        }

        .links li:nth-child(1) { animation-delay: 0.1s; }
        .links li:nth-child(2) { animation-delay: 0.15s; }
        .links li:nth-child(3) { animation-delay: 0.2s; }
        .links li:nth-child(4) { animation-delay: 0.25s; }
        .links li:nth-child(5) { animation-delay: 0.3s; }
        .links li:nth-child(6) { animation-delay: 0.35s; }
        .links li:nth-child(7) { animation-delay: 0.4s; }
        .links li:nth-child(8) { animation-delay: 0.45s; }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .links a {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            text-decoration: none;
            color: var(--text);
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .links a:hover {
            border-color: var(--accent);
            transform: translateX(4px);
        }

        .link-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .link-icon {
            font-size: 1.2rem;
            width: 24px;
            text-align: center;
            flex-shrink: 0;
        }

        .link-title {
            font-weight: 500;
        }

        .link-desc {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-left: 36px;
            margin-top: 2px;
        }

        .link-arrow {
            color: var(--text-light);
            font-size: 0.9rem;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .links a:hover .link-arrow {
            color: var(--accent);
        }

        /* 分组标题 */
        .group-title {
            font-size: 0.75rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 40px 0 16px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }

        .group-title:first-of-type {
            border-top: none;
            margin-top: 0;
            padding-top: 0;
        }

        /* 页脚 */
        .footer {
            text-align: center;
            padding: 40px 24px;
            color: var(--text-light);
            font-size: 0.8rem;
        }

        .footer a {
            color: var(--text-light);
            text-decoration: none;
        }

        .footer a:hover {
            color: var(--accent);
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .container {
                padding: 70px 20px 60px;
            }

            .profile-row {
                gap: 14px;
            }

            .profile-row h1 {
                font-size: 1.5rem;
            }

            .avatar {
                width: 56px;
                height: 56px;
            }

            .bio {
                font-size: 1.05rem;
            }

            .links a {
                padding: 14px 16px;
            }

            .link-desc {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
